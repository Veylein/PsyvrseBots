# Render service definitions: Unified Monorepo Deployment
# 
# This configuration defines a single service (psyvrse-launcher) that manages all bots.
# Previously, this file defined multiple services which caused duplicate bot instances
# and rate-limiting (429) issues.
#
# To use this updated configuration:
# 1. Update your Render Blueprint or manually delete the extra services (pax-bot, ludus-bot, psy-source).
# 2. Ensure `psyvrse-launcher` has all necessary environment variables for all bots.

services:
  - type: worker
    name: psyvrse-launcher
    env: python
    plan: free
    root: .
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    autoDeploy: true

  # COMMENTED OUT TO PREVENT DUPLICATE INSTANCES OF WORKER BOTS (Managed by psyvrse-launcher)
  # - type: worker
  #   name: pax-bot
  #   ...

  # PsySource: Keep as separate Web Service for webhooks/HTTP
  - type: web
    name: psy-source
    env: node
    plan: free
    root: PsySource
    # Prefer reproducible installs if you commit a package-lock.json
    # If you do NOT have a lockfile, Render will run `npm install` instead.
    buildCommand: npm ci --production --no-audit --no-fund || npm install --production --no-audit --no-fund
    startCommand: npm start
    autoDeploy: true

